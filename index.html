<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>wiskascg</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor"></div>
    
    <video id="bg-video" class="bg-video" loop playsinline muted src="background.mp4" preload="auto"></video>
    <audio id="bg-audio" loop src="background.mp3" preload="auto"></audio>

    <div id="start-screen" class="start">
        <div class="start-content">
            <div id="loader-circle" class="loader-circle"></div>
            <p id="status-text">LOADING ASSETS...</p>
            <div id="enter-hint" class="enter-hint">CLICK TO ENTER</div>
        </div>
    </div>

    <main class="container">
        <div class="main-card-bg"></div>

        <div class="bento-grid">
            <a href="https://discord.com/users/1474075672526852158" target="_blank" class="tile profile-tile">
                <div class="av-container">
                    <img id="discord-av" src="" class="avatar">
                    <div id="status-dot" class="status-indicator"></div>
                </div>
                <div class="profile-info">
                    <h1 id="discord-name">wiskascg</h1>
                    <span id="discord-tag">@wiskascg</span>
                </div>
            </a>

            <a href="https://t.me/wiskascg" target="_blank" class="tile social-tile tg-main">
                <i class="fa-brands fa-telegram"></i>
                <span>лс</span>
            </a>

            <a href="https://github.com/wiskas-n" target="_blank" class="tile social-tile github">
                <i class="fa-brands fa-github"></i>
                <span>гитхаб</span>
            </a>

            <a href="https://t.me/wiskas_n" target="_blank" class="tile social-tile tg-channel">
                <i class="fa-brands fa-telegram"></i>
                <span>тгк</span>
            </a>
            <a href="https://t.me/doxernet" target="_blank" class="tile social-tile tg-main">
                <i class="fa-brands fa-telegram"></i>
                <span>твинк</span>
            </a>

            <a href="https://t.me/+4UAXN-Im8L00MGRl" target="_blank" class="tile projects-tile">
                <div class="projects-content">
                    <i class="fa-solid fa-code-branch"></i>
                    <div class="text">
                        <strong>проекты</strong>
                        <small>посмотри мои последние проекты</small>
                    </div>
                </div>
            </a>

            <div id="dynamic-tile" class="tile dynamic-tile" style="display: none;"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
